<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UAJ English - Full E-Learning ☀️</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@500;700;800&display=swap');
        
        :root {
            --bg: #E0F7FA; --card: #FFFFFF; --primary: #00BCD4; --secondary: #FF4081;
            --success: #4CAF50; --danger: #F44336; --text: #263238; --warning: #FFC107;
        }

        body { font-family: 'Nunito', sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .container { background: var(--card); padding: 30px; border-radius: 24px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); max-width: 650px; width: 100%; border: 3px solid #B2EBF2; position: relative; z-index: 10; max-height: 90vh; overflow-y: auto; }
        
        /* Custom Scrollbar */
        .container::-webkit-scrollbar { width: 8px; }
        .container::-webkit-scrollbar-thumb { background-color: #B2EBF2; border-radius: 10px; }

        .hidden { display: none !important; }
        h1 { color: var(--secondary); font-size: 28px; text-align: center; margin-top: 0; }
        
        .rules { background: #FFF0F5; padding: 15px; border-radius: 12px; border-left: 5px solid var(--secondary); margin-bottom: 20px; font-size: 15px; color: #455A64; }

        button { display: block; background: var(--primary); color: white; border: none; padding: 15px; margin: 10px 0; border-radius: 12px; cursor: pointer; font-size: 16px; font-weight: 700; width: 100%; position: relative; z-index: 20; transition: transform 0.2s; }
        button:hover:not(:disabled) { opacity: 0.9; transform: translateY(-2px); }
        button:disabled { background: #CFD8DC; color: #78909C; cursor: not-allowed; transform: none; }
        
        .option-btn { background: #F5F5F5; color: var(--text); border: 2px solid #E0E0E0; text-align: left; }
        .correct { background: var(--success) !important; color: white !important; border-color: var(--success) !important; }
        .wrong { background: var(--danger) !important; color: white !important; border-color: var(--danger) !important; }

        .header-bar { display: flex; justify-content: space-between; font-weight: 800; color: #546E7A; margin-bottom: 20px; border-bottom: 2px solid #EEEEEE; padding-bottom: 10px; }
        #question-text { font-size: 18px; font-weight: 800; margin-bottom: 20px; line-height: 1.5; }
        
        #explanation-box { background: #E8F5E9; border-left: 5px solid var(--success); padding: 15px; margin-top: 15px; border-radius: 8px; }
        #explanation-box h4 { margin: 0 0 5px 0; color: var(--success); font-size: 16px; }
        #explanation-text { margin: 0; font-size: 15px; line-height: 1.4; color: #37474F; }
        
        .score { font-size: 60px; font-weight: 800; color: var(--primary); text-align: center; margin: 10px 0; }

        #btn-materi { background: var(--warning); color: #263238; font-size: 18px; animation: pulse 2s infinite; border: 2px solid #FF9800; }
        #bonus-1-btn, #bonus-2-btn { background: #9C27B0; animation: pulse 2s infinite; }
        
        @keyframes pulse { 0% {transform: scale(1);} 50% {transform: scale(1.02);} 100% {transform: scale(1);} }
        
        .progress-wrapper { width: 100%; height: 10px; background: #EEEEEE; border-radius: 10px; margin-bottom: 20px; }
        .progress-bar { height: 100%; background: linear-gradient(90deg, #00BCD4, #FF4081); width: 0%; transition: width 0.3s; border-radius: 10px; }

        /* Materi Screen Styles */
        .lesson-content { text-align: left; line-height: 1.6; color: #37474F; font-size: 16px; margin-bottom: 25px; }
        .lesson-content h3 { color: var(--primary); border-bottom: 2px solid #B2EBF2; padding-bottom: 5px; }
        .lesson-content .example-box { background: #F3E5F5; padding: 12px; border-radius: 8px; border-left: 4px solid #9C27B0; margin: 10px 0; }
    </style>
</head>
<body>

    <!-- HOME -->
    <div id="home-screen" class="container">
        <h1>✨ Persiapan UAJ English ✨</h1>
        
        <button id="btn-materi" onclick="showMateriMenu()">📚 BACA MATERI & CONTOH (NEW)</button>
        
        <div class="rules" style="margin-top: 20px;">
            <strong>Kuis Utama:</strong> Tiap sesi 25 soal. Selesaikan Sesi 1-5 untuk membuka <strong>2 Sesi Bonus</strong> (Ujian Akhir).
        </div>
        
        <div id="main-sessions">
            <button onclick="startSession(1)">Sesi 1: Expressions</button>
            <button onclick="startSession(2)" style="background: #03A9F4;">Sesi 2: Grammar & Tenses</button>
            <button onclick="startSession(3)" style="background: #00BCD4;">Sesi 3: Labels</button>
            <button onclick="startSession(4)" style="background: #009688;">Sesi 4: Procedure & Descriptive</button>
            <button onclick="startSession(5)" style="background: #4CAF50;">Sesi 5: Narrative & Report</button>
        </div>

        <div id="bonus-sessions" class="hidden" style="margin-top: 25px; border-top: 2px dashed #B0BEC5; padding-top: 20px;">
            <h3 style="text-align: center; margin-top: 0; color: #E91E63;">🔥 Ujian Akhir Terbuka 🔥</h3>
            <button id="bonus-1-btn" onclick="startSession('bonus1')">BONUS 1 (Full Materi A)</button>
            <button id="bonus-2-btn" onclick="startSession('bonus2')">BONUS 2 (Full Materi B)</button>
        </div>
    </div>

    <!-- MATERI MENU SCREEN -->
    <div id="materi-menu-screen" class="container hidden">
        <h1>Pilih Materi Belajar 📖</h1>
        <button onclick="openLesson(1)" style="background: #00BCD4;">Materi 1: Expressions & Dialogues</button>
        <button onclick="openLesson(2)" style="background: #03A9F4;">Materi 2: Grammar (Tenses & Modals)</button>
        <button onclick="openLesson(3)" style="background: #009688;">Materi 3: Labels (Food & Medicine)</button>
        <button onclick="openLesson(4)" style="background: #4CAF50;">Materi 4: Procedure & Descriptive</button>
        <button onclick="openLesson(5)" style="background: #8BC34A;">Materi 5: Narrative & Report Text</button>
        <button onclick="backToHome()" style="background: #9E9E9E; margin-top: 20px;">🔙 Kembali ke Home</button>
    </div>

    <!-- LESSON TEXT SCREEN -->
    <div id="lesson-screen" class="container hidden">
        <h2 id="lesson-title" style="color: var(--secondary); text-align: center;">Materi</h2>
        <div id="lesson-text" class="lesson-content"></div>
        
        <button id="start-materi-quiz-btn" style="background: var(--warning); color: #263238; font-size: 18px; border: 2px solid #FF9800; animation: pulse 2s infinite;" onclick="startMateriQuiz()">✍️ KERJAKAN 3 SOAL LATIHAN</button>
        <button onclick="backToMateriMenu()" style="background: #9E9E9E;">🔙 Kembali ke Daftar Materi</button>
    </div>

    <!-- KUIS (Dipakai buat Sesi Utama & Mini Quiz Materi) -->
    <div id="quiz-screen" class="container hidden">
        <div class="header-bar">
            <span id="session-title">Sesi X</span>
            <span id="question-counter">Soal 1/X</span>
        </div>
        <div class="progress-wrapper"><div class="progress-bar" id="progress-bar"></div></div>
        
        <div id="question-text"></div>
        <div id="options-container"></div>
        
        <div id="explanation-box" class="hidden">
            <h4 id="explanation-title">Penjelasan:</h4>
            <p id="explanation-text"></p>
        </div>
        
        <button id="next-btn" class="hidden" style="background: var(--secondary);" onclick="nextQuestion()">Selanjutnya ➔</button>
    </div>

    <!-- SKOR -->
    <div id="score-screen" class="container hidden">
        <h2 style="text-align: center; color: var(--success); font-size: 30px; margin-bottom: 0;">Selesai!</h2>
        <div class="score" id="final-score">100</div>
        <div class="rules" style="text-align: center; background: #E3F2FD; border-color: #03A9F4;">
            <p id="rest-message" style="margin: 0; font-weight: 800; color: #0288D1;"></p>
        </div>
        <button id="score-home-btn" onclick="backToHome()">🏠 Kembali ke Menu</button>
    </div>

    <script>
        // TEKS MATERI (TEORI & CONTOH)
        const lessonData = {
            1: `<h3>1. Expressions (Ungkapan)</h3>
                <p>Dalam percakapan bahasa Inggris, kita sering menggunakan ungkapan khusus:</p>
                <ul>
                    <li><strong>Congratulating (Memberi Selamat):</strong> Digunakan saat orang lain sukses. <br><div class="example-box"><strong>Contoh:</strong> "Congratulations on your graduation!" (Selamat atas kelulusanmu!)</div></li>
                    <li><strong>Thanking (Berterima kasih):</strong> <br><div class="example-box"><strong>A:</strong> "Thank you for the gift."<br><strong>B:</strong> "You're welcome / Don't mention it." (Sama-sama)</div></li>
                    <li><strong>Certainty (Kepastian):</strong> Menyatakan yakin akan sesuatu.<br><div class="example-box"><strong>Contoh:</strong> "I am absolutely sure we will win." (Saya sangat yakin kita akan menang). Jika ragu, katakan: "I doubt it" (Saya ragu).</div></li>
                </ul>`,
            2: `<h3>2. Grammar & Tenses</h3>
                <p>Perhatikan waktu kejadian untuk menentukan pola kalimat (Tenses):</p>
                <ul>
                    <li><strong>Present Continuous Tense:</strong> Kejadian yang sedang berlangsung <em>sekarang</em>. <br><div class="example-box"><strong>Rumus:</strong> S + is/am/are + V-ing<br><strong>Contoh:</strong> "Look! The bird <em>is flying</em>." (Lihat! Burungnya sedang terbang).</div></li>
                    <li><strong>Simple Past Tense:</strong> Kejadian yang <em>sudah selesai</em> di masa lalu (yesterday, last night). <br><div class="example-box"><strong>Rumus:</strong> S + Verb 2<br><strong>Contoh:</strong> "I <em>bought</em> a new car yesterday." (Saya membeli mobil baru kemarin).</div></li>
                    <li><strong>Modal Can/Could (Kemampuan):</strong> Menyatakan bisa/mampu. <br><div class="example-box"><strong>Contoh:</strong> "Fish <em>can</em> swim." (Ikan bisa berenang). "I <em>could not</em> read when I was a baby." (Bentuk lampau: could).</div></li>
                </ul>`,
            3: `<h3>3. Labels (Label Makanan/Obat)</h3>
                <p>Label berisi informasi penting pada kemasan produk. Istilah penting:</p>
                <ul>
                    <li><strong>Keep out of reach of children:</strong> Jauhkan dari jangkauan anak-anak (agar tidak terminum tanpa sengaja).</li>
                    <li><strong>Expiration Date / Best Before:</strong> Tanggal kedaluwarsa. Produk tidak boleh dikonsumsi setelah tanggal ini.</li>
                    <li><strong>Dosage:</strong> Dosis atau takaran minum obat. <br><div class="example-box"><strong>Contoh:</strong> "Dosage: 2 tablets daily." (Dosis: 2 tablet setiap hari / per hari).</div></li>
                    <li><strong>Store in a cool dry place:</strong> Simpan di tempat yang sejuk (misal: kulkas/lemari) dan kering.</li>
                </ul>`,
            4: `<h3>4. Procedure & Descriptive Text</h3>
                <p><strong>A. Procedure Text</strong> (Teks Prosedur): Mengajarkan cara membuat atau melakukan sesuatu.</p>
                <div class="example-box"><strong>Struktur:</strong> 1. Goal (Tujuan) -> 2. Materials (Bahan/Alat) -> 3. Steps (Langkah-langkah).<br><em>Banyak memakai Action Verb (kata kerja fisik) seperti: cut, stir, boil, pour.</em></div>
                <p><strong>B. Descriptive Text</strong> (Teks Deskripsi): Menggambarkan ciri-ciri satu objek spesifik (misal: kucingku, kamarku).</p>
                <div class="example-box"><strong>Struktur:</strong> 1. Identification (Mengenalkan nama/jenis objek) -> 2. Description (Menjelaskan ciri fisik, warna, sifat).</div>`,
            5: `<h3>5. Narrative & Report Text</h3>
                <p><strong>A. Narrative Text</strong> (Teks Narasi/Cerita): Cerita fiksi (dongeng, legenda) yang tujuannya <strong>menghibur (to entertain)</strong> dan memberi pesan moral.</p>
                <div class="example-box"><strong>Struktur:</strong> 1. Orientation (Pengenalan) -> 2. Complication (Muncul Masalah) -> 3. Resolution (Penyelesaian masalah). Memakai Past Tense.</div>
                <p><strong>B. Report Text</strong> (Teks Laporan): Mendeskripsikan sesuatu secara <strong>ilmiah dan umum</strong> (misal: ciri-ciri Kucing pada umumnya, proses terjadinya Tsunami). Memakai Simple Present Tense.</p>`
        };

        // DATABASE SOAL (Gabungan Soal Latihan Materi & Soal Utama)
        const qData = {
            'materi1': [
                {q:"A: I won the storytelling contest! <br>B: ...", options:["I am sorry","Congratulations!","Thank you","You're welcome"], answer:1, explanation:"Menang lomba direspon dengan Congratulations!"},
                {q:"A: Thank you so much for the gift. <br>B: ...", options:["Don't mention it","I doubt it","I am sorry","Excuse me"], answer:0, explanation:"'Don't mention it' (sama-sama) membalas terima kasih."},
                {q:"A: Are you sure we will pass the exam? <br>B: ... We studied very hard.", options:["I am not sure","Maybe","I doubt it","I am absolutely sure"], answer:3, explanation:"Sudah belajar keras berarti sangat yakin (absolutely sure)."}
            ],
            'materi2': [
                {q:"Sshh! Be quiet. The baby ... right now.", options:["sleeps","is sleeping","slept","sleeping"], answer:1, explanation:"'right now' = Present Continuous (is + V-ing)."},
                {q:"We ... to the museum last week.", options:["go","goes","went","going"], answer:2, explanation:"'Last week' (lampau) = Verb 2 (went)."},
                {q:"A bird is an animal that ... fly in the sky.", options:["cannot","must not","can","should"], answer:2, explanation:"Kemampuan burung = bisa (can) terbang."}
            ],
            'materi3': [
                {q:"'Keep out of reach of children' means...", options:["Give to children","Store away from kids","Children must drink","Throw away"], answer:1, explanation:"Jauhkan dari jangkauan anak-anak."},
                {q:"'Dosage: 1 tablet daily'. How many in a week?", options:["1 tablet","2 tablets","7 tablets","10 tablets"], answer:2, explanation:"Daily = 1 tiap hari. Seminggu (7 hari) = 7 tablet."},
                {q:"'Store in a cool place', you can put it in a...", options:["Oven","Under the sun","Refrigerator","Hot table"], answer:2, explanation:"Tempat sejuk (cool) adalah kulkas/lemari pendingin."}
            ],
            'materi4': [
                {q:"Main goal of a Procedure text?", options:["To entertain","To describe a cat","To tell how to make/do something","To report a fact"], answer:2, explanation:"Teks prosedur memandu cara membuat sesuatu."},
                {q:"'First, chop the garlic.' 'Chop' is a...", options:["Noun","Sequence word","Action verb","Adjective"], answer:2, explanation:"Chop (mencincang) = action verb."},
                {q:"Generic structure of Descriptive Text?", options:["Orientation - Complication","Goal - Steps","Identification - Description","General Class - Desc"], answer:2, explanation:"Struktur deskripsi = Identification & Description."}
            ],
            'materi5': [
                {q:"Purpose of Narrative Text (Cinderella) is...", options:["To entertain the reader","To make a cake","To report animal facts","To argue"], answer:0, explanation:"Dongeng bertujuan menghibur (to entertain)."},
                {q:"Problem in a narrative story is called...", options:["Orientation","Complication","Resolution","Steps"], answer:1, explanation:"Munculnya masalah = Complication."},
                {q:"Report text uses ... tense because it states facts.", options:["Simple Past","Future","Past Continuous","Simple Present"], answer:3, explanation:"Fakta ilmiah = Simple Present Tense."}
            ],
            1: [
                {q:"A: I got an A on my English test! <br>B: ...", options:["Congratulations!","Thank you","I'm sorry","You're welcome"], answer:0, explanation:"Ungkapan yang tepat untuk prestasi orang lain adalah memberi selamat (Congratulations)."},
                {q:"A: Here is the book you borrowed. <br>B: ... <br>A: Don't mention it.", options:["Excuse me","Sorry","Thank you","Congratulations"], answer:2, explanation:"Respon 'Don't mention it' (Sama-sama) digunakan untuk membalas 'Thank you'."},
                {q:"A: Are you sure it will rain today? <br>B: ... Look at those dark clouds.", options:["I doubt it","I am not sure","Yes, absolutely","Maybe"], answer:2, explanation:"Awan gelap adalah bukti kuat, jadi responnya menunjukkan kepastian (absolutely)."},
                {q:"Teacher: Good morning, class! <br>Students: ...", options:["Good evening!","Good morning!","Goodbye!","Good night!"], answer:1, explanation:"Sapaan Good morning dibalas dengan Good morning."},
                {q:"A: Thank you for helping me clean the room. <br>B: ...", options:["No problem","I am sorry","Congratulations","Good job"], answer:0, explanation:"'No problem' adalah cara merespon ucapan terima kasih."},
                {q:"A: I won the drawing contest. <br>B: Wow, ...", options:["That's terrible","How poor you are","Congratulations!","I disagree"], answer:2, explanation:"Menang lomba harus direspon dengan ucapan selamat."},
                {q:"A: Do you think it will rain today? <br>B: ... The sky is very clear.", options:["I'm sure it will","I doubt it","Absolutely","Definitely"], answer:1, explanation:"Langit cerah berarti kemungkinan hujan diragukan (I doubt it)."},
                {q:"A: Happy birthday, Rina! <br>B: ...", options:["Thank you","Congratulations","I'm sorry","Nice to meet you"], answer:0, explanation:"Diberi ucapan selamat ulang tahun dijawab dengan terima kasih."},
                {q:"A: I am going to Bali next week. <br>B: ...", options:["Have a safe trip!","I am sorry","Get well soon","Congratulations"], answer:0, explanation:"Orang yang bepergian diucapkan 'Have a safe trip'."},
                {q:"A: Will you join the club? <br>B: ... I have a swimming class.", options:["Sure","Of course","I'm not sure I can","Definitely"], answer:2, explanation:"Ada jadwal bentrok, jadi dia tidak yakin bisa ikut."},
                {q:"A: What are you going to do this weekend? <br>B: ...", options:["I visited my aunt","I am going to watch a movie","I was sleeping","I like apples"], answer:1, explanation:"Future plan (going to do) dijawab dengan 'am going to'."},
                {q:"A: I got a bad score on the test. <br>B: ... You can study harder next time.", options:["Congratulations","That's great","I'm sorry to hear that","Thank you"], answer:2, explanation:"Respon empati terhadap kabar buruk."},
                {q:"A: Let me help you carry those bags. <br>B: ... You are very kind.", options:["Thank you","Sorry","Congratulations","No, I won't"], answer:0, explanation:"Menerima bantuan dan berterima kasih atas kebaikan."},
                {q:"A: Are you certain that the train departs at 7 PM? <br>B: ... I just checked.", options:["I am not sure","Yes, I am certain","I doubt it","Maybe"], answer:1, explanation:"Mengecek jadwal membuktikan kepastian."},
                {q:"Mother: ... for the beautiful flowers. <br>Daughter: You're welcome, Mom.", options:["Sorry","Congratulations","Thank you","Excuse me"], answer:2, explanation:"Ada balasan 'You're welcome', berarti ibunya berterima kasih."},
                {q:"A: I have a terrible headache. <br>B: ...", options:["Congratulations!","Get well soon!","Thank you!","Good luck!"], answer:1, explanation:"Orang sakit diberi ucapan 'Get well soon'."},
                {q:"A: 'How long will you stay in Jakarta?' <br>B: 'For three days.' <br>B expresses...", options:["Future plan","Duration of time","Certainty","Congratulation"], answer:1, explanation:"'For three days' menunjukkan durasi waktu."},
                {q:"A: My brother bought me a new bicycle. <br>B: Wow, ...", options:["How lucky you are!","That's too bad","I am sorry","You are wrong"], answer:0, explanation:"Respon senang melihat teman beruntung."},
                {q:"A: ... <br>B: I am going to buy vegetables.", options:["What did you do?","What are you doing?","Where did you go?","What are you going to do?"], answer:3, explanation:"Jawaban berupa rencana (am going to), pertanyaan juga harus rencana."},
                {q:"A: Can you come to my house? <br>B: ... I have to help my mom.", options:["I'm afraid I can't","Sure, I will","Of course","I am certain"], answer:0, explanation:"Menolak halus karena ada urusan lain."},
                {q:"He is my neighbor. He is very polite. <br>The boy's character is...", options:["Arrogant","Polite","Lazy","Angry"], answer:1, explanation:"Karakter disebutkan jelas dalam teks yaitu 'polite' (sopan)."},
                {q:"A: Congratulations on your graduation! <br>B: ...", options:["I am sorry","Thank you so much","Get well soon","Don't mention it"], answer:1, explanation:"Balasan ucapan selamat adalah terima kasih."},
                {q:"Is it true the school is closed? <br>B: ... The principal announced it.", options:["I doubt it","I don't think so","Yes, absolutely","Maybe"], answer:2, explanation:"Ada bukti pengumuman kepala sekolah, jadi pasti benar."},
                {q:"Budi is helping the old lady. He is very ...", options:["Cruel","Lazy","Helpful","Selfish"], answer:2, explanation:"Suka menolong = helpful."},
                {q:"A: I forgot my pen. <br>B: Borrow mine. <br>A: ...", options:["Thanks a lot","I am sorry","No problem","Congratulations"], answer:0, explanation:"Berterima kasih karena dipinjami pulpen."}
            ],
            2: [
                {q:"Listen! The birds ... beautifully in the trees.", options:["sing","sings","is singing","are singing"], answer:3, explanation:"'Listen!' menandakan Present Continuous. Birds (jamak) pakai 'are singing'."},
                {q:"My mother ... fried rice yesterday.", options:["cook","cooks","cooked","cooking"], answer:2, explanation:"'Yesterday' menandakan Simple Past. Verb 2 dari cook = cooked."},
                {q:"I ... speak English when I was 10, but now I can.", options:["can","cannot","could","could not"], answer:3, explanation:"Ketidakmampuan di masa lalu menggunakan 'could not'."},
                {q:"Look! The students ... football in the yard.", options:["play","plays","are playing","is playing"], answer:2, explanation:"'Look!' = Present Cont. Students (jamak) pakai 'are playing'."},
                {q:"They ... to the zoo last weekend.", options:["go","goes","went","going"], answer:2, explanation:"'Last weekend' = Simple Past. Verb 2 dari go = went."},
                {q:"Dina: ... you help me carry this box? <br>Sita: Sure.", options:["Can","Must","Should","May"], answer:0, explanation:"Meminta bantuan (request) menggunakan modal 'Can'."},
                {q:"Sshh! Please be quiet. The baby ...", options:["sleeps","slept","is sleeping","are sleeping"], answer:2, explanation:"'Sshh!' kejadian sedang berlangsung. Baby (tunggal) pakai 'is sleeping'."},
                {q:"I ... a funny movie last night.", options:["see","sees","saw","seeing"], answer:2, explanation:"'Last night' = Simple Past. Verb 2 dari see = saw."},
                {q:"Fish ... live in the water.", options:["can","cannot","must not","should not"], answer:0, explanation:"Fakta kemampuan ikan = bisa hidup di air (can)."},
                {q:"We ... studying English at the moment.", options:["am","is","are","were"], answer:2, explanation:"'At the moment' = Present Cont. 'We' menggunakan 'are'."},
                {q:"She ... a letter two days ago.", options:["write","writes","wrote","written"], answer:2, explanation:"'Two days ago' = Simple Past. Verb 2 dari write = wrote."},
                {q:"A penguin is a bird, but it ... fly.", options:["can","cannot","could","could not"], answer:1, explanation:"Fakta kemampuan penguin tidak bisa terbang (cannot)."},
                {q:"What ... you doing right now?", options:["do","does","are","is"], answer:2, explanation:"Subjek 'you' pada Present Cont. pasangannya 'are'."},
                {q:"My father ... a new car last year.", options:["buy","buys","bought","buying"], answer:2, explanation:"'Last year' = Simple Past. Verb 2 buy = bought."},
                {q:"... you swim? Yes, I am very good at it.", options:["Can","Do","Are","Will"], answer:0, explanation:"Menanyakan kemampuan menggunakan Can."},
                {q:"The mechanic ... fixing my car now.", options:["am","is","are","was"], answer:1, explanation:"'Now' = Present Cont. Mechanic (tunggal) = 'is'."},
                {q:"They ... not come to my party yesterday.", options:["do","does","did","are"], answer:2, explanation:"Kalimat negatif Simple Past menggunakan did + not."},
                {q:"I am full. I ... eat anymore.", options:["can","cannot","must","should"], answer:1, explanation:"Sudah kenyang berarti tidak bisa makan lagi (cannot)."},
                {q:"Right now, it ... raining heavily.", options:["is","are","am","was"], answer:0, explanation:"Subjek 'it' pada Present Continuous dipasangkan dengan 'is'."},
                {q:"... she visit her uncle last Sunday?", options:["Do","Does","Did","Is"], answer:2, explanation:"Kalimat tanya Simple Past menggunakan Did."},
                {q:"Cats ... see in the dark very well.", options:["can","cannot","should","must not"], answer:0, explanation:"Kemampuan alami kucing bisa melihat di tempat gelap."},
                {q:"Why are you ... ?", options:["cry","cries","crying","cried"], answer:2, explanation:"Pertanyaan Present Cont. menggunakan to be + Verb-ing (crying)."},
                {q:"He ... milk for breakfast this morning.", options:["drink","drinks","drank","drunk"], answer:2, explanation:"'This morning' (berlalu) = Simple Past. Verb 2 drink = drank."},
                {q:"My brother is 2 years old, so he ... read yet.", options:["can","cannot","must","should"], answer:1, explanation:"Anak 2 tahun belum memiliki kemampuan membaca (cannot)."},
                {q:"Look at the clouds! It ... getting darker.", options:["is","are","am","were"], answer:0, explanation:"Subjek 'It' menggunakan to be 'is'."}

            3: [
                {q:"'Keep out of reach of children' means...", options:["Give it to children","Store away from kids","Children must drink it","Throw it away"], answer:1, explanation:"Jauhkan dari jangkauan anak-anak."},
                {q:"'Expiration Date: 12/10/2026' means we...", options:["Should eat it after","Made on that date","Must not consume after","It is cheap"], answer:2, explanation:"Produk dilarang dikonsumsi setelah tanggal kedaluwarsa."},
                {q:"'Dosage: 2 tablets daily' means we take...", options:["2 a week","1 a day","2 a day","4 a day"], answer:2, explanation:"Daily berarti setiap hari."},
                {q:"Where do we usually find 'Nutrition Facts'?", options:["Books","Food labels","Clothes","Shoes"], answer:1, explanation:"Fakta gizi selalu ada di label makanan/minuman."},
                {q:"'Shake well before use' is an instruction to...", options:["Drink slowly","Mix by shaking","Boil it","Freeze it"], answer:1, explanation:"Obat cair harus dikocok (mix by shaking)."},

                {q:"'Net Weight: 500g' shows the product's...", options:["Price","Mass","Ingredients","Date"], answer:1, explanation:"Net weight menunjukkan massa/berat bersih."},
                {q:"'Store at room temp'. Do NOT put it in...", options:["Cupboard","Table","Refrigerator","Shelf"], answer:2, explanation:"Suhu ruang = dilarang masuk kulkas."},
                {q:"'Ingredients: Sugar, Cocoa, Milk.' This is...", options:["Shampoo","Chocolate milk","Syrup","Bread"], answer:1, explanation:"Bahan dasar susu cokelat."},
                {q:"'Relieves headache and fever.' It is for...", options:["Stomachache","Cough","Headache & fever","Toothache"], answer:2, explanation:"Teks menyebutkan sakit kepala dan demam."},
                {q:"'Zero artificial colors.' It means it...", options:["Has many colors","Is colorless","Uses natural colors","Is bad"], answer:2, explanation:"Nol pewarna buatan berarti warnanya alami."},
                {q:"'May cause drowsiness.' You shouldn't...", options:["Drink","Sleep","Drive","Eat"], answer:2, explanation:"Drowsiness = ngantuk. Dilarang menyetir."},
                {q:"'Manufactured by PT Sehat'. It means...", options:["Sold","Bought","Made by","Eaten"], answer:2, explanation:"Manufactured = diproduksi/dibuat."},
                {q:"'Use within 3 days after opening.' Means...", options:["Keep 3 years","Throw away","Consume max 3 days","Do not open"], answer:2, explanation:"Maksimal dikonsumsi 3 hari setelah dibuka."},

            4: [
                {q:"Main goal of Procedure text?", options:["Amuse","Describe person","Tell how to make something","Report fact"], answer:2, explanation:"Tujuan prosedur = memandu cara membuat sesuatu."},
                {q:"'First, wash tomatoes.' 'First' is a...", options:["Sequence word","Noun","Adjective","Pronoun"], answer:0, explanation:"First, Next, Then = kata penanda urutan."},
                {q:"Generic structure of descriptive text?", options:["Orientation - Complication","Identification - Description","Goal - Steps","Class - Desc"], answer:1, explanation:"Struktur deskriptif = Identification & Description."},
                {q:"'My cat has soft fur.' This is part of...", options:["Identification","Description","Orientation","Resolution"], answer:1, explanation:"Mendeskripsikan ciri fisik masuk ke Description."},
                {q:"Action Verb used in a recipe?", options:["Beautiful","Chop","Tall","Smart"], answer:1, explanation:"Action verb = tindakan fisik seperti 'chop' (mencincang)."},
                {q:"What belongs in 'Identification'?", options:["Cat's habit","Introducing the name","Feeding the cat","A story"], answer:1, explanation:"Identification = pengenalan awal objek."},
                {q:"'Materials' section contains...", options:["Tools and ingredients","Result","Moral","Location"], answer:0, explanation:"Berisi bahan (ingredients) dan alat (tools)."},
                {q:"'First, turn on stove.' This is...", options:["Ingredient","Step","Description","Orientation"], answer:1, explanation:"Kalimat perintah masuk ke bagian Langkah (Step)."},
                {q:"Descriptive text tense?", options:["Past","Present","Future","Perfect"], answer:1, explanation:"Fakta saat ini memakai Simple Present Tense."},
                {q:"Describes 'My Bedroom' focuses on...", options:["Build room","Specific room detail","Story","General rooms"], answer:1, explanation:"Teks deskriptif fokus pada satu objek spesifik."},
                {q:"'Finally, serve the rice.' This is the...", options:["First step","Material","Goal","Last step"], answer:3, explanation:"'Finally' selalu ada di langkah terakhir."},
                {q:"Title for Procedure Text?", options:["Cinderella","How to Make Tea","My Dog","History"], answer:1, explanation:"Judul 'How to' khas untuk prosedur."},
                {q:"'Borobudur is in Magelang.' This is...", options:["Steps","Complication","Identification","Resolution"], answer:2, explanation:"Pengenalan lokasi/objek di awal = Identification."},
                {q:"Temporal conjunction for next step?", options:["Because","But","Then","Although"], answer:2, explanation:"'Then' = konjungsi temporal untuk urutan."},
                {q:"'Long ears and short tail.' Describes a...", options:["Rabbit","Snake","Fish","Bird"], answer:0, explanation:"Ciri fisik kelinci."},
                {q:"Main idea is...", options:["Last word","Core topic","Translation","Title"], answer:1, explanation:"Gagasan utama / inti topik."},
                {q:"'Pour hot water.' 'Pour' means...", options:["Cut","Eat","Transfer liquid","Sleep"], answer:2, explanation:"Pour = menuang cairan."},
                {q:"Describe personality using words like...", options:["Tall","Black hair","Kind, lazy","Big"], answer:2, explanation:"Sifat (ramah, malas, baik)."},
                {q:"'1 tablespoon of sugar' belongs to...", options:["Steps","Goal","Materials","Resolution"], answer:2, explanation:"Takaran bahan masuk Materials."},
                {q:"Descriptive text aims to...", options:["Tell story","Instructions","Describe particular thing","Argue"], answer:2, explanation:"Mendeskripsikan spesifik suatu objek."},
                {q:"'Stir mixture.' Synonym of 'stir'...", options:["Mix","Throw","Cut","Bake"], answer:0, explanation:"Stir (mengaduk) = mix."},
                {q:"'Mom is a nurse. She...' 'She' refers to...", options:["Hospital","Mom","Text","Nurse"], answer:1, explanation:"'She' merujuk ke subjek perempuan sebelumnya."},
                {q:"Phrase for step in making kite?", options:["Paper, glue","My kite blue","Tie strings","I love kite"], answer:2, explanation:"Instruksi/langkah = tie strings."},
                {q:"'White sand and clear water.' Describes...", options:["Personality","Physical feature","Steps","Materials"], answer:1, explanation:"Ciri fisik dari sebuah pantai."},
                {q:"Why read descriptive text?", options:["Cook","Visualize the object","Sleep","Learn moral"], answer:1, explanation:"Membantu pembaca membayangkan objek tersebut."}
            ],
            5: [
                {q:"Problem in narrative is called...", options:["Resolution","Complication","Orientation","Re-orientation"], answer:1, explanation:"Munculnya masalah = Complication."},
                {q:"Report differs from Descriptive because Report describes...", options:["Specifically","Generally","Chronologically","Fictively"], answer:1, explanation:"Report Text menjelaskan secara umum/ilmiah."},
                {q:"Purpose of narrative texts...", options:["Make product","Facts","Entertain and moral","News"], answer:2, explanation:"Tujuan = menghibur dan memberi pesan moral."},
                {q:"End of story where problem solved...", options:["Complication","Resolution","Steps","Identification"], answer:1, explanation:"Penyelesaian masalah = Resolution."},
                {q:"Narrative Texts tense?", options:["Present","Past","Future","Present Cont"], answer:1, explanation:"Dongeng/cerita masa lalu memakai Past Tense."},
                {q:"Scientific anatomy of Elephants is a...", options:["Narrative","Procedure","Report","Recount"], answer:2, explanation:"Penjabaran fakta spesies = Report Text."},
                {q:"Example of Narrative text?", options:["Camera manual","Malin Kundang","Volcanoes","My School"], answer:1, explanation:"Malin Kundang = legenda/Narasi."},
                {q:"'Once upon a time...' belongs to...", options:["Orientation","Complication","Resolution","Steps"], answer:0, explanation:"Pengenalan tokoh/waktu = Orientation."},
                {q:"Moral value means...", options:["Funny part","Lesson we can learn","Characters","Setting"], answer:1, explanation:"Pelajaran yang bisa dipetik dari cerita."},
                {q:"Report text about pollution ends with...", options:["Fairy tale","Steps","Conclusion/solutions","Recipe"], answer:2, explanation:"Report fenomena sering diakhiri solusi."},
                {q:"Generic structure of Report Text?", options:["Orient - Comp","Goal - Steps","General Class - Desc","Id - Desc"], answer:2, explanation:"Klasifikasi umum lalu deskripsi."},
                {q:"'Snakes are cold-blooded.' This is from...", options:["Procedure","Narrative","Report","Recount"], answer:2, explanation:"Fakta biologi hewan secara umum = Report."},
                {q:"Cinderella leaving slipper is the...", options:["Complication","Orientation","Materials","Class"], answer:0, explanation:"Puncak masalah cerita = Complication."},
                {q:"Report Text uses Simple Present to...", options:["Tell story","State general facts","Give commands","Past events"], answer:1, explanation:"Fakta ilmiah yang selalu benar = Present Tense."},
                {q:"'Boy realized his mistake.' This is...", options:["Orientation","Complication","Resolution","Materials"], answer:2, explanation:"Penyadaran/maaf = bentuk penyelesaian."},
                {q:"'Carnivores' means...", options:["Plant eaters","Meat eaters","Water drinkers","Grass eaters"], answer:1, explanation:"Carnivore = pemakan daging."},
                {q:"Characters, time, place in story = ...", options:["Setting","Problem","Resolution","Moral"], answer:0, explanation:"Latar (setting) pada bagian Orientation."},
                {q:"Fable characters are...", options:["Kings","Gods","Talking animals","Robots"], answer:2, explanation:"Fabel = hewan yang bisa bicara."},
                {q:"'Tsunamis caused by earthquakes.' Text?", options:["Report","Narrative","Procedure","Desc"], answer:0, explanation:"Fakta fenomena alam = Report."},
                {q:"Tortoise and Hare moral?", options:["Slow and steady wins","Fast is better","Bad rabbits","Don't sleep"], answer:0, explanation:"Pelan tapi konsisten akan menang."},
                {q:"'Whales breathe with lungs.' This is...", options:["Description of Report","Complication","Steps","Orientation"], answer:0, explanation:"Fakta detail pada bagian Description (Report)."},
                {q:"After complication comes...", options:["Orientation","Resolution","Steps","Class"], answer:1, explanation:"Masalah (complication) -> penyelesaian (resolution)."},
                {q:"Photosynthesis main idea...", options:["Eat meat","How plants make food","Why plants die","Where plants live"], answer:1, explanation:"Bagaimana tumbuhan membuat makanan."},
                {q:"Text to present info based on research?", options:["Narrative","Report","Procedure","Recount"], answer:1, explanation:"Informasi dari fakta/penelitian = Report Text."},
                {q:"Legend of 'Sangkuriang' explains...", options:["Mountain formation","Cook rice","Modern city","Weather"], answer:0, explanation:"Legenda asal-usul gunung Tangkuban Perahu."}
            ],
            'bonus1': [],
            'bonus2': []
        };

        let currentSession = '';
        let currentQuestions = [];
        let currentQuestionIndex = 0;
        let correctCount = 0;
        let completedMainSessions = [];
        let currentMateriID = 1;

        // FUNGSI NAVIGASI MATERI
        function showMateriMenu() {
            document.getElementById('home-screen').classList.add('hidden');
            document.getElementById('materi-menu-screen').classList.remove('hidden');
        }

        function backToMateriMenu() {
            document.getElementById('lesson-screen').classList.add('hidden');
            document.getElementById('materi-menu-screen').classList.remove('hidden');
        }

        function openLesson(materiID) {
            currentMateriID = materiID;
            document.getElementById('materi-menu-screen').classList.add('hidden');
            document.getElementById('lesson-screen').classList.remove('hidden');
            
            document.getElementById('lesson-title').innerText = `Bab ${materiID}`;
            document.getElementById('lesson-text').innerHTML = lessonData[materiID];
        }

        function startMateriQuiz() {
            document.getElementById('lesson-screen').classList.add('hidden');
            // Mulai kuis dengan array 'materiX' yang isinya 3 soal
            startSession(`materi${currentMateriID}`);
        }

        // FUNGSI KUIS UTAMA (Spaced Repetition & Quiz Engine)
        function backToHome() {
            document.getElementById('score-screen').classList.add('hidden');
            document.getElementById('materi-menu-screen').classList.add('hidden');
            document.getElementById('home-screen').classList.remove('hidden');
            
            if (completedMainSessions.length >= 5) {
                document.getElementById('bonus-sessions').classList.remove('hidden');
            }
        }

        function startSession(sessionID) {
            currentSession = sessionID;
            currentQuestions = qData[sessionID];
            currentQuestionIndex = 0;
            correctCount = 0;
            
            document.getElementById('home-screen').classList.add('hidden');
            document.getElementById('quiz-screen').classList.remove('hidden');
            
            // Set judul header (Kalau 'materi1' jadi 'Latihan Materi', kalau '1' jadi 'Sesi 1')
            let titleStr = "";
            if(String(sessionID).includes('materi')) titleStr = "Latihan Materi";
            else if(typeof sessionID === 'number') titleStr = `Sesi ${sessionID}`;
            else titleStr = "Ujian Akhir";
            
            document.getElementById('session-title').innerText = titleStr;
            loadQuestion();
        }

        function loadQuestion() {
            const q = currentQuestions[currentQuestionIndex];
            document.getElementById('question-counter').innerText = `Soal ${currentQuestionIndex + 1}/${currentQuestions.length}`;
            document.getElementById('progress-bar').style.width = ((currentQuestionIndex + 1) / currentQuestions.length) * 100 + '%';
            
            document.getElementById('question-text').innerHTML = q.q;
            const optionsContainer = document.getElementById('options-container');
            optionsContainer.innerHTML = '';
            
            document.getElementById('next-btn').classList.add('hidden');
            document.getElementById('explanation-box').classList.add('hidden');

            q.options.forEach((opt, index) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerHTML = `${String.fromCharCode(65 + index)}. ${opt}`;
                btn.onclick = () => checkAnswer(index, btn, q.answer, q.explanation);
                optionsContainer.appendChild(btn);
            });
        }

        function checkAnswer(selectedIndex, btnElement, correctIndex, explanationText) {
            const allButtons = document.querySelectorAll('.option-btn');
            allButtons.forEach(b => b.disabled = true); 

            const explBox = document.getElementById('explanation-box');
            const explTitle = document.getElementById('explanation-title');

            if (selectedIndex === correctIndex) {
                btnElement.classList.add('correct');
                correctCount++;
                explBox.style.borderLeftColor = "var(--success)";
                explTitle.style.color = "var(--success)";
                explTitle.innerText = "✅ Benar!";
            } else {
                btnElement.classList.add('wrong');
                allButtons[correctIndex].classList.add('correct');
                explBox.style.borderLeftColor = "var(--danger)";
                explTitle.style.color = "var(--danger)";
                explTitle.innerText = "❌ Kurang Tepat!";
            }

            document.getElementById('explanation-text').innerHTML = explanationText;
            explBox.classList.remove('hidden');
            document.getElementById('next-btn').classList.remove('hidden');
        }

        function nextQuestion() {
            currentQuestionIndex++;
            if (currentQuestionIndex < currentQuestions.length) {
                loadQuestion();
            } else {
                endSession();
            }
        }

        function endSession() {
            document.getElementById('quiz-screen').classList.add('hidden');
            document.getElementById('score-screen').classList.remove('hidden');
            
            let finalScore = Math.round((correctCount / currentQuestions.length) * 100);
            document.getElementById('final-score').innerText = finalScore;
            
            let restMsg = "";
            let btnHome = document.getElementById('score-home-btn');
            
            // Logika Evaluasi & Pesan Istirahat
            if (String(currentSession).includes('materi')) {
                restMsg = "Latihan Materi selesai! Lanjut baca materi lain atau gas Kuis Utama?";
                btnHome.innerText = "🔙 Kembali ke Daftar Materi";
                btnHome.onclick = () => {
                    document.getElementById('score-screen').classList.add('hidden');
                    document.getElementById('materi-menu-screen').classList.remove('hidden');
                };
            } else {
                if (typeof currentSession === 'number' && !completedMainSessions.includes(currentSession)) {
                    completedMainSessions.push(currentSession);
                }
                btnHome.innerText = "🏠 Kembali ke Home";
                btnHome.onclick = backToHome;
                
                if(currentSession === 1) restMsg = "Istirahat 2 Jam! Biar otak lu gak nge-lag.";
                else if(currentSession === 2) restMsg = "Minum dulu, tarik napas, lanjut Sesi 3.";
                else if(currentSession === 3) restMsg = "TIDUR BANG! Lanjut subuh aja.";
                else if(currentSession === 4) restMsg = "Subuhan beres? Hajar Sesi 5!";
                else if(completedMainSessions.length >= 5) restMsg = "MANTAP! 2 Sesi Ujian Akhir Udah Kebuka!";
            }
            
            document.getElementById('rest-message').innerText = restMsg;
        }
    </script>
